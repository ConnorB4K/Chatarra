<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="Chatarra — Chat anónimo en tiempo real. Crea o únete a salas con un código de 6 caracteres." />
  <meta name="theme-color" content="#6c14f0" />
  <title>Chatarra</title>

  <!-- Favicon (inline SVG) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236c14f0'/><text x='50' y='72' font-size='60' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'>C</text></svg>" />

  <!-- FontAwesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Styles -->
  <link rel="stylesheet" href="./css/styles.css" />

  <!-- Preload chat background -->
  <link rel="preload" as="image" href="./assets/background/background.png" />
</head>

<body>
  <div id="app">

    <!-- ═══════ LOBBY VIEW ═══════ -->
    <div id="lobby-view">
      <div class="lobby-logo">
        <div class="lobby-logo-icon">
          <i class="fa-solid fa-comments"></i>
        </div>
        <h1>Chatarra</h1>
        <p>Chat anónimo en tiempo real</p>
      </div>

      <div class="lobby-actions">
        <div class="lobby-nickname-group">
          <label for="nickname-input" class="lobby-label">
            <i class="fa-solid fa-user"></i> Tu apodo
          </label>
          <input
            type="text"
            id="nickname-input"
            maxlength="20"
            placeholder="Escribe tu apodo..."
            autocomplete="off"
            spellcheck="false"
            aria-label="Apodo de usuario"
          />
        </div>

        <button id="btn-create-room" class="btn btn-primary btn-full">
          <i class="fa-solid fa-plus"></i> Crear Sala
        </button>

        <div class="lobby-divider">o únete con un código</div>

        <div class="lobby-input-group">
          <input
            type="text"
            id="room-code-input"
            maxlength="6"
            placeholder="Código"
            autocomplete="off"
            spellcheck="false"
            aria-label="Código de sala"
          />
          <button id="btn-join-room" class="btn btn-primary btn-icon" aria-label="Unirse a sala">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
          </button>
        </div>

        <div id="rejoin-section" class="rejoin-section" style="display: none;">
          <div class="lobby-divider">sala reciente</div>
          <button id="btn-rejoin-room" class="btn btn-secondary btn-full rejoin-btn">
            <div class="rejoin-btn-content">
              <div class="rejoin-btn-top">
                <i class="fa-solid fa-clock-rotate-left"></i>
                Volver a <span id="rejoin-room-code"></span>
              </div>
              <div id="rejoin-preview" class="rejoin-preview"></div>
            </div>
          </button>
        </div>
      </div>

      <!-- Theme button in lobby -->
      <button id="btn-lobby-theme" class="lobby-theme-btn" aria-label="Cambiar tema">
        <i class="fa-solid fa-palette"></i>
      </button>
    </div>

    <!-- ═══════ CHAT VIEW ═══════ -->
    <div id="chat-view">

      <!-- Header -->
      <header class="chat-header">
        <button id="btn-back" class="chat-header-back" aria-label="Volver al lobby">
          <i class="fa-solid fa-arrow-left"></i>
        </button>
        <div class="chat-header-info">
          <h2 id="chat-header-title">Sala</h2>
          <div id="chat-header-code" class="chat-header-code" title="Copiar código">
            <i class="fa-solid fa-hashtag"></i>
            <span id="chat-header-code-text"></span>
            <i class="fa-regular fa-copy" style="font-size: 0.65rem; margin-left: 2px;"></i>
          </div>
        </div>
        <div class="chat-header-actions">
          <button id="btn-options" aria-label="Opciones">
            <i class="fa-solid fa-ellipsis-vertical"></i>
          </button>
        </div>
      </header>

      <!-- Options Dropdown -->
      <div id="options-menu-backdrop" class="options-menu-backdrop"></div>
      <div id="options-menu" class="options-menu">
        <button id="btn-copy-code">
          <i class="fa-regular fa-copy"></i> Copiar código
        </button>
        <button id="btn-change-nick">
          <i class="fa-solid fa-user-pen"></i> Cambiar apodo
        </button>
        <button id="btn-change-theme">
          <i class="fa-solid fa-palette"></i> Cambiar tema
        </button>
        <button id="btn-toggle-sound">
          <i class="fa-solid fa-volume-high"></i> Sonido: Activado
        </button>
        <button id="btn-clear-chat" class="danger">
          <i class="fa-solid fa-broom"></i> Vaciar chat para mí
        </button>
      </div>

      <!-- Messages -->
      <div id="chat-messages" class="chat-messages">
        <!-- Messages are rendered dynamically -->
      </div>

      <!-- Sticker Panel -->
      <div id="sticker-panel" class="presets-panel">
        <div class="presets-panel-header">
          <h3>Stickers</h3>
          <button class="presets-panel-close" aria-label="Cerrar panel de stickers">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div id="sticker-grid" class="sticker-grid">
          <!-- Stickers rendered by JS -->
        </div>
      </div>

      <!-- Audio Panel -->
      <div id="audio-panel" class="presets-panel">
        <div class="presets-panel-header">
          <h3>Audios</h3>
          <button class="presets-panel-close" aria-label="Cerrar panel de audios">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div id="audio-list" class="audio-list">
          <!-- Audio presets rendered by JS -->
        </div>
      </div>

      <!-- Reply Bar -->
      <div id="reply-bar" class="reply-bar">
        <div class="reply-bar-content">
          <div id="reply-bar-sender" class="reply-bar-sender"></div>
          <div id="reply-bar-text" class="reply-bar-text"></div>
        </div>
        <button id="reply-bar-close" class="reply-bar-close" aria-label="Cancelar respuesta">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <!-- Input Bar -->
      <div class="chat-input-bar">
        <div class="chat-input-attachments">
          <button id="btn-stickers" aria-label="Stickers">
            <i class="fa-solid fa-face-laugh-beam"></i>
          </button>
          <button id="btn-audio-presets" aria-label="Audios preestablecidos">
            <i class="fa-solid fa-headphones"></i>
          </button>
        </div>
        <div class="chat-input-field-wrapper">
          <textarea
            id="chat-input"
            rows="1"
            placeholder="Escribe un mensaje..."
            autocomplete="off"
            spellcheck="true"
            aria-label="Mensaje"
          ></textarea>
          <button id="btn-clip" class="clip-btn" aria-label="Adjuntar imagen">
            <i class="fa-solid fa-paperclip"></i>
          </button>
        </div>
        <input type="file" id="imgbb-file-input" accept="image/*" hidden />
        <button id="btn-send" class="chat-send-btn" aria-label="Enviar mensaje">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>


    </div>

    <!-- ═══════ EDIT MESSAGE MODAL ═══════ -->
    <div id="edit-modal" class="modal-backdrop">
      <div class="modal-card">
        <h3><i class="fa-solid fa-pen"></i> Editar mensaje</h3>
        <textarea id="edit-textarea" rows="3" placeholder="Nuevo contenido..."></textarea>
        <div class="modal-card-actions">
          <button id="btn-edit-cancel" class="btn btn-secondary">Cancelar</button>
          <button id="btn-edit-save" class="btn btn-primary">Guardar</button>
        </div>
      </div>
    </div>

    <!-- ═══════ THEME SELECTOR MODAL ═══════ -->
    <div id="theme-modal" class="modal-backdrop">
      <div class="modal-card theme-modal-card">
        <h3><i class="fa-solid fa-palette"></i> Elige un tema</h3>
        <div id="theme-grid" class="theme-grid">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>

    <!-- ═══════ IMAGE PREVIEW ═══════ -->
    <div id="image-preview-overlay" class="image-preview-overlay">
      <img src="" alt="Vista previa" />
    </div>

    <!-- ═══════ TOASTS ═══════ -->
    <div id="toast-container" class="toast-container"></div>

  </div>

  <!-- ═══════ Firebase SDKs (compat v9) ═══════ -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

  <!-- ═══════ App Modules ═══════ -->
  <script src="./js/auth.js"></script>
  <script src="./js/rooms.js"></script>
  <script src="./js/media.js"></script>
  <script src="./js/presets.js"></script>
  <script src="./js/swipe.js"></script>
  <script src="./js/notifications.js"></script>
  <script src="./js/chat.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
